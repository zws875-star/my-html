<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气工具</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#02103a;
  color:#fff;
}
.wrap{max-width:1200px;margin:auto;padding:28px 20px}
.card{
  background:#232b43;
  padding:28px;
  border-radius:28px;
  margin-bottom:18px;
}
.topbar{
  display:grid;
  grid-template-columns:1.2fr 1.2fr auto;
  gap:14px;
  align-items:center;
}
input,button{
  height:64px;
  border-radius:18px;
  border:none;
  font-size:22px;
}
input{
  width:100%;
  padding:0 20px;
  background:#fff;
  color:#111827;
}
button{
  padding:0 24px;
  background:#facc15;
  color:#111827;
  font-weight:800;
  cursor:pointer;
}
button:disabled{opacity:.7;cursor:not-allowed}
.temp{
  font-size:92px;
  font-weight:800;
  margin:26px 0 10px;
  line-height:1;
}
.desc{
  font-size:26px;
  color:rgba(255,255,255,.92);
}
.title{
  font-size:28px;
  font-weight:800;
  margin-bottom:16px;
}
.list{display:grid;gap:12px}
.item{
  background:rgba(255,255,255,.06);
  padding:16px 18px;
  border-radius:16px;
  font-size:22px;
  line-height:1.6;
}
.status{
  margin-top:14px;
  color:rgba(255,255,255,.78);
  font-size:18px;
}
@media (max-width: 820px){
  .topbar{grid-template-columns:1fr}
  .temp{font-size:68px}
  .desc,.title,.item,input,button{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="topbar">
      <input id="city" value="安阳" placeholder="城市">
      <input id="date" type="date">
      <button id="searchBtn" onclick="run()">查询</button>
    </div>

    <div class="temp" id="temp">--°C</div>
    <div class="desc" id="desc">等待查询</div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div class="title">穿衣建议</div>
    <div id="advice" class="list"></div>
  </div>

  <div class="card">
    <div class="title">出行建议</div>
    <div id="travel" class="list"></div>
  </div>

</div>

<script>
function setTomorrow(){
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  document.getElementById("date").value = `${y}-${m}-${day}`;
}

function showList(id, arr){
  document.getElementById(id).innerHTML = arr.map(v => `<div class="item">${v}</div>`).join("");
}

async function run(){
  const city = document.getElementById("city").value.trim() || "安阳";
  const date = document.getElementById("date").value;
  const status = document.getElementById("status");
  const btn = document.getElementById("searchBtn");

  if(!date){
    status.innerText = "请先选择日期。";
    return;
  }

  btn.disabled = true;
  status.innerText = "查询中...";

  try{
    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
    const geoRes = await fetch(geoUrl);
    const geo = await geoRes.json();

    if(!geo.results || !geo.results.length){
      throw new Error("没有找到这个城市");
    }

    const lat = geo.results[0].latitude;
    const lon = geo.results[0].longitude;
    const cityName = geo.results[0].name;

    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=Asia/Shanghai&start_date=${date}&end_date=${date}`;
    const weatherRes = await fetch(weatherUrl);
    const data = await weatherRes.json();

    if(!data.daily || !data.daily.temperature_2m_max || !data.daily.temperature_2m_max.length){
      throw new Error("天气数据为空");
    }

    const max = Math.round(data.daily.temperature_2m_max[0]);
    const min = Math.round(data.daily.temperature_2m_min[0]);
    const pop = Math.round((data.daily.precipitation_probability_max || [0])[0] || 0);
    const wind = Math.round((data.daily.windspeed_10m_max || [0])[0] || 0);
    const gap = max - min;

    document.getElementById("temp").innerText = max + "°C";
    document.getElementById("desc").innerText = `${cityName} · ${date} · 温差 ${gap}°C`;

    const advice = [];
    if(min <= 10) advice.push("早晚偏凉，建议长袖 + 薄外套。");
    else advice.push("基础穿搭可选长袖或薄上衣。");
    if(max >= 26) advice.push("中午偏暖，热了可以脱外套。");
    if(gap >= 10) advice.push("昼夜温差大，分层穿搭最稳。");
    if(pop >= 40) advice.push("降水概率偏高，建议带伞。");
    if(wind >= 30) advice.push("风偏大，外套尽量有点防风能力。");
    if(!advice.length) advice.push("体感整体平稳，正常穿搭即可。");

    const travel = [];
    if(pop < 40) travel.push("整体适合出行。");
    else travel.push("出门建议备伞，注意天气变化。");
    if(min <= 10) travel.push("早出晚归时别穿太少。");
    if(max >= 28) travel.push("中午户外久待记得补水。");
    if(wind >= 30) travel.push("骑车时注意风力影响。");

    showList("advice", advice);
    showList("travel", travel);
    status.innerText = "查询完成。";
  }catch(e){
    document.getElementById("temp").innerText = "--°C";
    document.getElementById("desc").innerText = "查询失败";
    showList("advice", ["请检查城市名、日期，或稍后重试。"]);
    showList("travel", ["当前未获取到可用天气数据。"]);
    status.innerText = e.message || "请求失败";
  }finally{
    btn.disabled = false;
  }
}

setTomorrow();
</script>
</body>
</html>
