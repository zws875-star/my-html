<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气工具</title>
<style>
body{margin:0;font-family:-apple-system;background:#0b1020;color:#fff}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.1);padding:20px;border-radius:20px;margin-bottom:15px}
input,button{padding:12px;border-radius:10px;border:none;margin:5px}
input{width:40%}
button{background:#facc15;font-weight:bold}
.temp{font-size:48px;margin:10px 0}
.list{margin-top:10px}
.item{margin:6px 0}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<input id="city" value="安阳">
<input id="date" type="date">
<button onclick="run()">查询</button>

<div class="temp" id="temp">--°C</div>
<div id="desc">等待查询</div>
</div>

<div class="card">
<h3>穿衣建议</h3>
<div id="advice" class="list"></div>
</div>

<div class="card">
<h3>出行建议</h3>
<div id="travel" class="list"></div>
</div>

</div>

<script>
async function run(){
const city=document.getElementById("city").value;
const date=document.getElementById("date").value;

try{
let geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`).then(r=>r.json());
let lat=geo.results[0].latitude;
let lon=geo.results[0].longitude;

let data=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia/Shanghai&start_date=${date}&end_date=${date}`).then(r=>r.json());

let max=data.daily.temperature_2m_max[0];
let min=data.daily.temperature_2m_min[0];

document.getElementById("temp").innerText=max+"°C";
document.getElementById("desc").innerText="温差："+(max-min)+"°C";

let advice=[];
if(min<10) advice.push("加外套");
if(max>25) advice.push("中午可脱");
if(max-min>10) advice.push("注意温差");

document.getElementById("advice").innerHTML=advice.map(a=>"<div class='item'>"+a+"</div>").join("");

document.getElementById("travel").innerHTML="<div class='item'>适合出行</div>";

}catch(e){
document.getElementById("desc").innerText="查询失败";
}
}
</script>

</body>
</html>
